- name: Install
  ansible.builtin.package:
    name: keychain
    state: present
  become: true

- name: Create ~/.local/share/keychain
  ansible.builtin.file:
    state: directory
    path: ~/.local/share/keychain

- name: 'sh : Add block to sh_profile_middle'
  blockinfile:
    path: '{{ sh_profile_middle }}'
    marker: '# {mark} :: ANSIBLE MANAGED BLOCK :: {{ role_name }}'
    block: |
      if command -v keychain 1> /dev/null 2> /dev/null; then
        odir="--dir $HOME/.local/share/keychain"
        oeval="--eval id_ed25519 ACCB8F306184BEEE49E7370E5DBF2C327E72AA3F"
        eval `keychain --agents ssh,gpg --timeout 43200 $odir $oeval`
        unset odir; unset oeval
      fi
