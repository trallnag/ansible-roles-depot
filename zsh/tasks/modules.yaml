# ------------------------------------------------------------------------------
# OMZ


- name: Clone trallnag/ohmyzsh
  ansible.builtin.git:
    repo: https://github.com/trallnag/ohmyzsh.git
    dest: "{{ zsh_modules }}/oh-my-zsh"
    version: "HEAD"
    depth: 1
    force: true
  register: task

- name: Compile scripts in trallnag/ohmyzsh
  when: task.changed
  ansible.builtin.shell: |
    cd {{ zsh_modules }}/oh-my-zsh
    zcompile -R lib/*.zsh
    zcompile -R *.zsh
  args: { executable: /bin/zsh }


# ------------------------------------------------------------------------------
# zsh-completions


- name: Clone zsh-completions
  ansible.builtin.git:
